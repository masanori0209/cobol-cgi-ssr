<form class="demo-form" method="post" action="/posts/new">
  <label>
    Title
    <input name="title" required maxlength="40" placeholder="Indexed file entry title">
  </label>
  <label>
    Body
    <textarea name="body" required maxlength="120" placeholder="Stored in data/posts.dat"></textarea>
  </label>
  <button type="submit" class="btn btn-primary">Save post</button>
</form>
